    branches:
      - main
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'

permissions: {}

jobs:
  call-basic-validation:
    name: Basic validation
    uses: actions/reusable-workflows/.github/workflows/basic-validation.yml@4735e71081024a944852f4ab9d1495b6dd2de8f2 # main
    with:
      node-version: '24.x'
