name: Test python-version-file input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create python version file
        run: |
          echo "3.11" > .python-version
      - id: action
        uses: .
        with:
          python-version-file: .python-version
      - name: Assert python-version output is set
        env:
          ACTUAL: ${{ steps.action.outputs.python-version }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: python-version output is empty"
            exit 1
          fi
          echo "PASS: python-version=$ACTUAL"
      - name: Assert python-path output is set
        env:
          ACTUAL: ${{ steps.action.outputs.python-path }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: python-path output is empty"
            exit 1
          fi
          echo "PASS: python-path=$ACTUAL"
      - name: Assert python version matches file
        run: |
          PYVER=$(python --version 2>&1)
          echo "Python version: $PYVER"
          if ! echo "$PYVER" | grep -q "3.11"; then
            echo "FAIL: expected Python 3.11 but got: $PYVER"
            exit 1
          fi
          echo "PASS: correct Python version installed"
