name: Test python-path output is executable
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup-python
        uses: .
        with:
          python-version: "3.12"
          update-environment: "true"
      - name: Assert python-path output is a valid executable
        env:
          PYTHON_PATH: ${{ steps.setup-python.outputs.python-path }}
        run: |
          echo "python-path: $PYTHON_PATH"
          if [ -z "$PYTHON_PATH" ]; then
            echo "FAIL: python-path output is empty"
            exit 1
          fi
          if [ ! -x "$PYTHON_PATH" ]; then
            echo "FAIL: python-path '$PYTHON_PATH' is not executable"
            exit 1
          fi
          echo "PASS: python-path is executable"
      - name: Assert python-path runs and reports correct version
        env:
          PYTHON_PATH: ${{ steps.setup-python.outputs.python-path }}
        run: |
          echo "Running: $PYTHON_PATH --version"
          VERSION=$("$PYTHON_PATH" --version 2>&1)
          echo "Got: $VERSION"
          if ! echo "$VERSION" | grep -q "3.12"; then
            echo "FAIL: expected Python 3.12, got '$VERSION'"
            exit 1
          fi
          echo "PASS"
      - name: Assert python-version output matches 3.12
        env:
          ACTUAL: ${{ steps.setup-python.outputs.python-version }}
        run: |
          echo "python-version output: $ACTUAL"
          if ! echo "$ACTUAL" | grep -q "3.12"; then
            echo "FAIL: expected version containing '3.12', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
