name: Test setup-python with pip-version
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: .
        with:
          python-version: "3.11"
          pip-version: "24.0"
      - name: Assert python-version output is set
        env:
          ACTUAL: ${{ steps.setup.outputs.python-version }}
        run: |
          echo "actual python-version: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: python-version output is empty"
            exit 1
          fi
          if ! echo "$ACTUAL" | grep -qE '^3\.11'; then
            echo "FAIL: expected python-version to start with 3.11, got: $ACTUAL"
            exit 1
          fi
          echo "PASS"
      - name: Assert pip version is correct
        run: |
          PIP_VER=$(pip --version 2>&1)
          echo "pip version: $PIP_VER"
          if ! echo "$PIP_VER" | grep -qE 'pip 24\.0'; then
            echo "FAIL: expected pip 24.0, got: $PIP_VER"
            exit 1
          fi
          echo "PASS"
