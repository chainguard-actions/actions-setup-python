name: Test basic Python setup
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: .
        with:
          python-version: "3.11"
      - name: Assert python-version output is set
        env:
          ACTUAL: ${{ steps.setup.outputs.python-version }}
        run: |
          echo "actual python-version: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: python-version output is empty"
            exit 1
          fi
          echo "PASS: python-version output is '$ACTUAL'"
      - name: Assert python-path output is set
        env:
          ACTUAL: ${{ steps.setup.outputs.python-path }}
        run: |
          echo "actual python-path: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: python-path output is empty"
            exit 1
          fi
          if [ ! -f "$ACTUAL" ]; then
            echo "FAIL: python-path '$ACTUAL' does not point to an existing file"
            exit 1
          fi
          echo "PASS: python-path output is '$ACTUAL'"
      - name: Assert Python is on PATH and correct version
        run: |
          echo "Python version on PATH:"
          python --version
          PYVER=$(python --version 2>&1)
          echo "Got: $PYVER"
          if ! echo "$PYVER" | grep -q "3.11"; then
            echo "FAIL: expected Python 3.11, got '$PYVER'"
            exit 1
          fi
          echo "PASS"
      - name: Assert pip is available
        run: |
          pip --version
          echo "PASS: pip is available"
