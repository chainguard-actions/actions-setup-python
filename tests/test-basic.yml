name: Test basic Python setup
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup-python
        uses: .
        with:
          python-version: "3.11"
      - name: Assert python-version output is set
        env:
          ACTUAL: ${{ steps.setup-python.outputs.python-version }}
        run: |
          echo "actual python-version: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: python-version output is empty"
            exit 1
          fi
          echo "PASS: python-version output is '$ACTUAL'"
      - name: Assert python-path output is set
        env:
          ACTUAL: ${{ steps.setup-python.outputs.python-path }}
        run: |
          echo "actual python-path: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: python-path output is empty"
            exit 1
          fi
          if [ ! -f "$ACTUAL" ]; then
            echo "FAIL: python-path '$ACTUAL' does not point to an existing file"
            exit 1
          fi
          echo "PASS: python-path is '$ACTUAL'"
      - name: Assert Python is on PATH and correct version
        run: |
          echo "Python version on PATH:"
          python --version
          PYTHON_VER=$(python --version 2>&1)
          echo "Got: $PYTHON_VER"
          if ! echo "$PYTHON_VER" | grep -q "3.11"; then
            echo "FAIL: expected Python 3.11, got '$PYTHON_VER'"
            exit 1
          fi
          echo "PASS"
