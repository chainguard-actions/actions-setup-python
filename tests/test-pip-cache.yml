name: Test Python setup with pip cache
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create a requirements.txt for cache key
        run: |
          echo "requests==2.31.0" > requirements.txt
      - id: setup-python
        uses: .
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"
      - name: Assert python-version output is set
        env:
          ACTUAL: ${{ steps.setup-python.outputs.python-version }}
        run: |
          echo "actual python-version: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: python-version output is empty"
            exit 1
          fi
          echo "PASS: python-version=$ACTUAL"
      - name: Assert cache-hit output is a boolean string
        env:
          ACTUAL: ${{ steps.setup-python.outputs.cache-hit }}
        run: |
          echo "actual cache-hit: $ACTUAL"
          if [ "$ACTUAL" != "true" ] && [ "$ACTUAL" != "false" ] && [ "$ACTUAL" != "" ]; then
            echo "FAIL: cache-hit should be 'true', 'false', or empty, got '$ACTUAL'"
            exit 1
          fi
          echo "PASS: cache-hit=$ACTUAL"
      - name: Assert Python 3.12 is on PATH
        run: |
          PYVER=$(python --version 2>&1)
          echo "Python version: $PYVER"
          if ! echo "$PYVER" | grep -q "3.12"; then
            echo "FAIL: expected Python 3.12, got $PYVER"
            exit 1
          fi
          echo "PASS: $PYVER"
      - name: Assert pip is available
        run: |
          pip --version
          echo "PASS: pip is available"
