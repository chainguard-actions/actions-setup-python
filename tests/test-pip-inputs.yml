name: Test pip-version and pip-install inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          python-version: "3.11"
          pip-version: "23.3.1"
          pip-install: "requests"
      - name: Assert python-version output is set
        env:
          ACTUAL: ${{ steps.action.outputs.python-version }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: python-version output was empty"
            exit 1
          fi
          echo "PASS"
      - name: Assert pip version is correct
        run: |
          PIP_VER=$(pip --version | awk '{print $2}')
          echo "pip version: $PIP_VER"
          if [ "$PIP_VER" != "23.3.1" ]; then
            echo "FAIL: expected pip 23.3.1, got $PIP_VER"
            exit 1
          fi
          echo "PASS"
      - name: Assert requests is installed
        run: |
          python -c "import requests; print('requests version:', requests.__version__)"
          echo "PASS"
