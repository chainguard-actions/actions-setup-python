name: Test Python setup with pip-install
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: setup-python
        uses: .
        with:
          python-version: "3.11"
          pip-install: "requests"
      - name: Assert python-version output is set
        env:
          ACTUAL: ${{ steps.setup-python.outputs.python-version }}
        run: |
          echo "actual python-version: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: python-version output is empty"
            exit 1
          fi
          echo "PASS: python-version=$ACTUAL"
      - name: Assert requests package is installed
        run: |
          echo "Checking if requests is installed..."
          python -c "import requests; print('requests version:', requests.__version__)"
          if [ $? -ne 0 ]; then
            echo "FAIL: requests package is not importable"
            exit 1
          fi
          echo "PASS: requests is installed"
      - name: Assert pip is available
        run: |
          pip --version
          echo "PASS: pip is available"
