name: Test architecture input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          python-version: "3.11"
          architecture: x64
      - name: Assert python-version output is set
        env:
          ACTUAL: ${{ steps.action.outputs.python-version }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: python-version output is empty"
            exit 1
          fi
          echo "PASS: python-version=$ACTUAL"
      - name: Assert python-path output is set
        env:
          ACTUAL: ${{ steps.action.outputs.python-path }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: python-path output is empty"
            exit 1
          fi
          echo "PASS: python-path=$ACTUAL"
      - name: Assert python is executable
        run: |
          python --version
          echo "PASS: python is on PATH"
