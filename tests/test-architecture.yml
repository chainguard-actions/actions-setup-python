name: Test architecture input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: setup-python
        uses: .
        with:
          python-version: "3.11"
          architecture: x64
      - name: Assert python-version output is set
        env:
          ACTUAL: ${{ steps.setup-python.outputs.python-version }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: python-version output should not be empty"
            exit 1
          fi
          echo "PASS: python-version=$ACTUAL"
      - name: Assert python-path output is set
        env:
          ACTUAL: ${{ steps.setup-python.outputs.python-path }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: python-path output should not be empty"
            exit 1
          fi
          echo "PASS: python-path=$ACTUAL"
      - name: Assert python is executable and correct architecture
        run: |
          python --version
          echo "PASS: python is executable"
