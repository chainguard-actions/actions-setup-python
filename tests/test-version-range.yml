name: Test Python setup with version range
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: .
        with:
          python-version: ">=3.9 <3.13"
      - name: Assert python-version output is set
        env:
          ACTUAL: ${{ steps.setup.outputs.python-version }}
        run: |
          echo "actual python-version: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: python-version output is empty"
            exit 1
          fi
          echo "PASS: resolved python-version is '$ACTUAL'"
      - name: Assert python-path output is set
        env:
          ACTUAL: ${{ steps.setup.outputs.python-path }}
        run: |
          echo "actual python-path: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: python-path output is empty"
            exit 1
          fi
          if [ ! -f "$ACTUAL" ]; then
            echo "FAIL: python-path '$ACTUAL' does not point to an existing file"
            exit 1
          fi
          echo "PASS: python-path is '$ACTUAL'"
      - name: Assert Python version is within range
        run: |
          PYVER=$(python --version 2>&1 | awk '{print $2}')
          echo "Installed Python version: $PYVER"
          MAJOR=$(echo "$PYVER" | cut -d. -f1)
          MINOR=$(echo "$PYVER" | cut -d. -f2)
          if [ "$MAJOR" -ne 3 ]; then
            echo "FAIL: expected major version 3, got $MAJOR"
            exit 1
          fi
          if [ "$MINOR" -lt 9 ] || [ "$MINOR" -ge 13 ]; then
            echo "FAIL: expected minor version between 9 and 12, got $MINOR"
            exit 1
          fi
          echo "PASS: Python $PYVER is within range >=3.9 <3.13"
