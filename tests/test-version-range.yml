name: Test Python setup with version range
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: setup
        uses: .
        with:
          python-version: "3.x"
          allow-prereleases: false
          update-environment: true

      - name: Assert python-version output is set
        env:
          ACTUAL: ${{ steps.setup.outputs.python-version }}
        run: |
          echo "actual python-version: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: python-version output is empty"
            exit 1
          fi
          echo "PASS: python-version=$ACTUAL"

      - name: Assert python-path output is set and executable exists
        env:
          ACTUAL: ${{ steps.setup.outputs.python-path }}
        run: |
          echo "actual python-path: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: python-path output is empty"
            exit 1
          fi
          if [ ! -f "$ACTUAL" ]; then
            echo "FAIL: python executable not found at $ACTUAL"
            exit 1
          fi
          echo "PASS: python-path=$ACTUAL"

      - name: Assert Python 3.x is on PATH (stable release)
        run: |
          VER=$(python --version 2>&1)
          echo "python version: $VER"
          if ! echo "$VER" | grep -qE "^Python 3\.[0-9]+\.[0-9]+$"; then
            echo "FAIL: expected a stable Python 3.x version but got: $VER"
            exit 1
          fi
          echo "PASS: $VER"
