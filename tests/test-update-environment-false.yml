name: Test Python setup with update-environment false
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      RUNNER_TOOL_CACHE: /tmp/hostedtoolcache
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Prepare tool cache directory
        run: mkdir -p /tmp/hostedtoolcache
      - id: setup
        uses: .
        with:
          python-version: "3.12"
          update-environment: false
      - name: Assert python-version output is set
        env:
          ACTUAL: ${{ steps.setup.outputs.python-version }}
        run: |
          echo "actual python-version: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: python-version output is empty"
            exit 1
          fi
          echo "PASS: python-version output is $ACTUAL"
      - name: Assert python-path output is set
        env:
          ACTUAL: ${{ steps.setup.outputs.python-path }}
        run: |
          echo "actual python-path: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: python-path output is empty"
            exit 1
          fi
          # The path should exist even if environment is not updated
          if [ ! -f "$ACTUAL" ]; then
            echo "FAIL: python-path does not point to an existing file: $ACTUAL"
            exit 1
          fi
          echo "PASS: python-path is $ACTUAL"
      - name: Assert python-path executable works
        env:
          PYTHON_PATH: ${{ steps.setup.outputs.python-path }}
        run: |
          echo "Running python via python-path output directly"
          VER=$("$PYTHON_PATH" --version 2>&1)
          echo "Got: $VER"
          if ! echo "$VER" | grep -q "3.12"; then
            echo "FAIL: expected Python 3.12 but got $VER"
            exit 1
          fi
          echo "PASS"
