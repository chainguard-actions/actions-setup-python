name: Test Python setup with python-version-file
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      RUNNER_TOOL_CACHE: /tmp/hostedtoolcache
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Prepare tool cache directory
        run: mkdir -p /tmp/hostedtoolcache
      - id: setup
        uses: .
        with:
          python-version-file: "tests/fixtures/.python-version-test"
      - name: Assert python-version output is set
        env:
          ACTUAL: ${{ steps.setup.outputs.python-version }}
        run: |
          echo "actual python-version: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: python-version output is empty"
            exit 1
          fi
          echo "PASS: python-version output is $ACTUAL"
      - name: Assert Python 3.10 is on PATH
        run: |
          VER=$(python --version 2>&1)
          echo "Got: $VER"
          if ! echo "$VER" | grep -q "3.10"; then
            echo "FAIL: expected Python 3.10 but got $VER"
            exit 1
          fi
          echo "PASS"
